<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Личный профиль — RandomTask</title>
    <link rel="stylesheet" href="static/style.css">
</head>
<body>
    <div class="bg-grid"></div>
    <div class="bg-glow bg-glow--1"></div>
    <div class="bg-glow bg-glow--2"></div>

    <header class="header">
        <div class="header__inner">
            <a href="/" class="logo">
                <span class="logo__mark">&gt;_</span>
                <span>Random</span>Task
            </a>
            <nav class="nav">
                <a href="/" class="nav__link">Главная</a>
                <a href="/profile" class="nav__link nav__link--active">Профиль</a>
		        <a href="/admin" class="nav__link" id="nav-admin-link" style="display: none;">Админка</a>
                <a href="/auth" class="nav__link" id="nav-auth-link">Войти</a>
            </nav>
        </div>
    </header>

    <main class="app-container">
        <div class="profile-layout">
            <aside class="panel profile-info">
                <div class="profile-header">
                    <h1 class="profile-username" id="profile-username">Пользователь</h1>
                    <p class="profile-role" id="profile-role">Загрузка…</p>
                </div>
                
                <div class="profile-stats" id="profile-stats">
                    <div class="stat-item">
                        <span class="stat-number" id="stat-saved">0</span>
                        <span class="stat-label">Сохранено</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-number" id="stat-completed">0</span>
                        <span class="stat-label">Выполнено</span>
                    </div>
                </div>
                
                <button class="btn btn--outline btn--full" id="btn-logout">Выйти из аккаунта</button>
            </aside>

            <section class="panel profile-history">
                <div class="history-header">
                    <h2 class="section-title">История задач</h2>
                    <div class="history-tabs">
                        <button class="tab-btn active" data-status="saved">Сохранённые</button>
                        <button class="tab-btn" data-status="completed">Выполненные</button>
                    </div>
                </div>
                
                <div class="history-list" id="tasks-list">
                    <p class="empty-message">Загрузка задач…</p>
                </div>
            </section>
        </div>
    </main>

    <script src="static/js/app.js"></script>
</body>
</html>
