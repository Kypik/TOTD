<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — RandomTask</title>
    <link rel="stylesheet" href="static/style.css">
    <style>
        .auth-container {
            max-width: 420px;
            margin: 0 auto;
            padding: 2rem 0;
        }
        .auth-tabs {
            display: flex;
            gap: 0;
            margin-bottom: 0;
            border-bottom: 1px solid var(--line);
        }
        .auth-tab {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--muted);
            font: inherit;
            font-size: 0.875rem;
            font-weight: 600;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            padding: 0.85rem 1rem;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            margin-bottom: -1px;
            transition: color 0.2s, border-color 0.2s;
        }
        .auth-tab:hover {
            color: var(--ink);
        }
        .auth-tab.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
        }
        .auth-form-wrapper {
            background: var(--surface);
            border: 1px solid var(--line);
            border-top: none;
            border-radius: 0 0 var(--radius) var(--radius);
            padding: 1.75rem 1.5rem;
            backdrop-filter: blur(12px);
        }
        .auth-form-wrapper h2 {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            letter-spacing: 0.04em;
        }
        .auth-form-wrapper .subtitle {
            color: var(--muted);
            font-size: 0.875rem;
            margin-bottom: 1.5rem;
        }
        .error-message {
            color: #f87171;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            padding: 0.6rem 0.75rem;
            border-radius: var(--radius);
            font-size: 0.85rem;
            margin-bottom: 1rem;
        }
        .success-message {
            color: #4ade80;
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.3);
            padding: 0.6rem 0.75rem;
            border-radius: var(--radius);
            font-size: 0.85rem;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <div class="bg-grid"></div>
    <div class="bg-glow bg-glow--1"></div>
    <div class="bg-glow bg-glow--2"></div>

    <header class="header">
        <div class="header__inner">
            <a href="/" class="logo">
                <span class="logo__mark">&gt;_</span>
                <span>Random</span>Task
            </a>
            <nav class="nav">
                <a href="/" class="nav__link">Главная</a>
                <a href="/profile" class="nav__link nav__link--active">Профиль</a>
		        <a href="/admin" class="nav__link" id="nav-admin-link" style="display: none;">Админка</a>
                <a href="/auth" class="nav__link" id="nav-auth-link">Войти</a>
            </nav>
        </div>
    </header>

    <main class="app-container">
        <div class="auth-container">
            <div class="auth-tabs">
                <button type="button" id="tab-login" class="auth-tab active">Вход</button>
                <button type="button" id="tab-register" class="auth-tab">Регистрация</button>
            </div>

            <div class="auth-form-wrapper" id="form-wrapper-login">
                <h2>Вход в аккаунт</h2>
                <p class="subtitle">Авторизуйтесь, чтобы сохранять выполненные задачи</p>
                
                <form id="login-form">
                    <div class="field">
                        <span>Имя пользователя</span>
                        <input type="text" id="login-name" placeholder="Введите имя" required autocomplete="username">
                    </div>
                    
                    <div class="field">
                        <span>Пароль</span>
                        <input type="password" id="login-password" placeholder="Введите пароль" required autocomplete="current-password">
                    </div>
                    
                    <div id="login-error" class="error-message hidden"></div>
                    
                    <button type="submit" class="btn btn--primary btn--full">Войти</button>
                </form>
            </div>

            <div class="auth-form-wrapper hidden" id="form-wrapper-register">
                <h2>Создать аккаунт</h2>
                <p class="subtitle">Зарегистрируйтесь, чтобы начать сохранять задачи</p>
                
                <form id="register-form">
                    <div class="field">
                        <span>Имя пользователя</span>
                        <input type="text" id="register-name" placeholder="Придумайте имя" required autocomplete="username">
                    </div>
                    
                    <div class="field">
                        <span>Пароль</span>
                        <input type="password" id="register-password" placeholder="Придумайте пароль" required autocomplete="new-password">
                    </div>
                    
                    <div class="field">
                        <span>Повторите пароль</span>
                        <input type="password" id="register-password2" placeholder="Повторите пароль" required autocomplete="new-password">
                    </div>
                    
                    <div id="register-error" class="error-message hidden"></div>
                    <div id="register-success" class="success-message hidden"></div>
                    
                    <button type="submit" class="btn btn--primary btn--full">Создать аккаунт</button>
                </form>
            </div>
        </div>
    </main>

    <script src="static/js/app.js"></script>
</body>
</html>
