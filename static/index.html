<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RandomTask — Генератор случайных задач</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="bg-grid"></div>
    <div class="bg-glow bg-glow--1"></div>
    <div class="bg-glow bg-glow--2"></div>

    <header class="header">
        <div class="header__inner">
            <a href="/" class="logo">
                <span class="logo__mark">&gt;_</span>
                <span>Random</span>Task
            </a>
            <nav class="nav">
                <a href="/" class="nav__link">Главная</a>
                <a href="/profile" class="nav__link nav__link--active">Профиль</a>
		        <a href="/admin" class="nav__link" id="nav-admin-link" style="display: none;">Админка</a>
                <a href="/auth" class="nav__link" id="nav-auth-link">Войти</a>
            </nav>
        </div>
    </header>

    <main class="app-container">
        <section id="step-categories" class="view-section">
            <div class="text-center" style="margin-bottom: 3rem;">
                <h1 style="font-size: 2rem; font-weight: 700; margin-bottom: 0.75rem; letter-spacing: 0.02em;">
                    Генератор случайных задач
                </h1>
                <p style="color: var(--muted); font-size: 1rem;">
                    Выберите интересующее вас направление для старта
                </p>
            </div>
            
            <div id="categories-grid" class="categories-container"></div>
        </section>

        <section id="step-params" class="view-section hidden">
            <div class="panel" style="max-width: 640px; margin: 0 auto;">
                <button id="btn-back-to-categories" class="btn btn--outline" style="margin-bottom: 1.5rem;">
                    ← Назад
                </button>
                
                <div style="margin-bottom: 1.5rem;">
                    <span style="font-family: var(--mono); font-size: 0.65rem; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: 0.12em;">
                        Категория
                    </span>
                    <h2 id="selected-category-title" style="font-size: 1.5rem; font-weight: 700; margin-top: 0.5rem;"></h2>
                </div>

                <div style="margin-bottom: 2rem;">
                    <span style="font-family: var(--mono); font-size: 0.65rem; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: 0.12em; display: block; margin-bottom: 0.75rem;">
                        Выберите уровень сложности:
                    </span>
                    <div class="difficulty-selector">
                        <label class="diff-option">
                            <input type="radio" name="difficulty" value="1" checked>
                            <div class="diff-card">
                                <div class="diff-card__dots">
                                    <span class="dot active"></span>
                                    <span class="dot"></span>
                                    <span class="dot"></span>
                                </div>
                                <div class="diff-card__label">Низкая</div>
                            </div>
                        </label>
                        <label class="diff-option">
                            <input type="radio" name="difficulty" value="2">
                            <div class="diff-card">
                                <div class="diff-card__dots">
                                    <span class="dot active"></span>
                                    <span class="dot active"></span>
                                    <span class="dot"></span>
                                </div>
                                <div class="diff-card__label">Средняя</div>
                            </div>
                        </label>
                        <label class="diff-option">
                            <input type="radio" name="difficulty" value="3">
                            <div class="diff-card">
                                <div class="diff-card__dots">
                                    <span class="dot active"></span>
                                    <span class="dot active"></span>
                                    <span class="dot active"></span>
                                </div>
                                <div class="diff-card__label">Высокая</div>
                            </div>
                        </label>
                    </div>
                </div>

                <button id="btn-generate-start" class="btn btn--primary btn--full">
                    Сгенерировать задачу
                </button>
            </div>
        </section>

        <section id="step-task" class="view-section hidden">
            <div class="panel" style="max-width: 720px; margin: 0 auto;">
                <button id="btn-back-to-params" class="btn btn--outline" style="margin-bottom: 1.5rem;">
                    ← Назад
                </button>

                <div style="display: flex; gap: 0.5rem; margin-bottom: 1rem; flex-wrap: wrap;">
                    <span id="task-category-badge" class="badge"></span>
                    <span id="task-difficulty-badge" class="badge"></span>
                    <span id="task-saved-count" class="badge badge-info" style="display: none;"></span>
                </div>

                <h2 id="task-title" style="font-size: 1.75rem; font-weight: 700; margin-bottom: 1rem; letter-spacing: 0.02em;">
                    Название задачи
                </h2>
                
                <p id="task-description" style="color: var(--muted); line-height: 1.7; font-size: 1rem; margin-bottom: 2rem;">
                    Описание загружается...
                </p>

                <div style="display: flex; gap: 0.75rem; flex-wrap: wrap;">
                    <button id="btn-reroll-task" class="btn btn--outline">
                        Другой вариант
                    </button>
                    <button id="btn-save-task" class="btn btn--primary">
                        Сохранить в профиль
                    </button>
                    <button id="btn-reset-menu" class="btn btn--outline" style="margin-left: auto;">
                        В главное меню
                    </button>
                </div>
            </div>
        </section>
    </main>

    <script src="/static/js/app.js"></script>
</body>
</html>
